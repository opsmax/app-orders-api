# Application Intent Contract
# This file declares what the application needs.
# The platform resolves it to concrete infrastructure.
apiVersion: idp.platform/v1
kind: ApplicationIntent
metadata:
  name: orders-api
  ownerTeam: commerce
  costCenter: CC5678
spec:
  environments:
    - dev
  compute:
    platform: aks
    workloadType: web-api
    containerImage: acridpshared.azurecr.io/orders-api
    autoscaling:
      minReplicas: 5
      maxReplicas: 25
  exposure:
    ingress: private
  data:
    postgres:
      enabled: true
      tier: general-purpose-small
  security:
    complianceTier: standard
    secrets: keyvault
  reliability:
    slo: "99.95"

# Workload-scoped resources
