name: CI

on:
  pull_request:
    paths: ['src/**', 'tests/**', 'Dockerfile']
  push:
    branches: [main]
    paths: ['src/**', 'tests/**', 'Dockerfile']

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r src/requirements.txt pytest httpx
      - name: Run tests
        run: pytest tests/ -v

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t orders-api:test .
      - name: Smoke test container
        run: |
          docker run -d --name test-container -p 8080:8080 orders-api:test
          sleep 3
          curl -f http://localhost:8080/health
          docker stop test-container
